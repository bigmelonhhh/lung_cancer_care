{% extends "layouts/base_portal.html" %}

{% block title %}患者咨询{% endblock %}

{% block body %}
<div x-data="mobilePatientChatList()" x-init="init()" class="fixed inset-0 bg-slate-50 overflow-hidden font-sans">
  {% csrf_token %}

  <div class="fixed top-0 left-0 right-0 bg-white/90 backdrop-blur-md border-b border-slate-100 z-50 pt-safe-top">
    <div class="h-12 px-4 flex items-center justify-between">
      <button type="button" class="w-9 h-9 rounded-full bg-slate-100 flex items-center justify-center active:scale-95 transition" @click="goBack()">
        <svg class="w-5 h-5 text-slate-700" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
        </svg>
      </button>
      <div class="min-w-0 px-2 flex-1 text-center">
        <div class="text-base font-bold text-slate-800 truncate">聊天记录：{{ patient.name }}</div>
      </div>
      <div class="w-9 h-9"></div>
    </div>
  </div>

  <div class="absolute inset-0 pb-safe-bottom" style="padding-top: calc(3rem + env(safe-area-inset-top));">
    <div
      x-ref="messagesContainer"
      class="h-full overflow-y-auto overscroll-contain px-4 py-4 space-y-4 scroll-smooth -webkit-overflow-scrolling-touch"
      :style="canChat ? 'padding-bottom: 92px;' : ''"
      @touchstart="onTouchStart($event)"
      @touchmove="onTouchMove($event)"
      @touchend="onTouchEnd()"
    >
      <div class="flex justify-center" x-show="hasNext || loadingOlder" style="display: none;">
        <div class="text-xs text-slate-400 bg-white/70 border border-slate-200 rounded-full px-3 py-1 shadow-sm">
          <span x-show="loadingOlder">加载中...</span>
          <span x-show="!loadingOlder">下拉加载更早消息</span>
        </div>
      </div>

      <template x-for="msg in messages" :key="msg.id">
        <div class="flex flex-col" :class="isMyMessage(msg) ? 'items-end' : 'items-start'">
          <div class="text-[11px] text-slate-300 mb-1 text-center w-full">
            <span x-text="msg.created_at_display || formatTime(msg.created_at)"></span>
          </div>

          <div class="flex max-w-[95%]" :class="isMyMessage(msg) ? 'flex-row-reverse' : 'flex-row'">
            <div class="flex-shrink-0 flex flex-col items-center mx-2">
              <div class="w-9 h-9 rounded-full flex items-center justify-center text-xs font-bold text-white"
                   :class="getAvatarColor(msg.sender_role)">
                <span x-text="(msg.sender_name || ' ').substring(0, 1)"></span>
              </div>
              <span class="text-[10px] text-slate-400 mt-1 max-w-[6rem] truncate" x-text="msg.sender_name"></span>
            </div>

            <div class="max-w-[75%]">
              <div class="px-4 py-2.5 rounded-2xl shadow-sm relative border border-black/5"
                   :class="isMyMessage(msg) ? 'bg-emerald-500 text-white rounded-tr-none' : 'bg-white text-slate-800 rounded-tl-none'">
                <p x-show="msg.content_type === 1" class="whitespace-pre-wrap break-words text-[15px] leading-6" x-text="msg.text_content"></p>

                <div x-show="msg.content_type === 2">
                  <img :src="msg.image_url" class="max-w-full rounded-lg cursor-pointer" @click="window.open(msg.image_url, '_blank')">
                </div>

                <div x-show="msg.sending" class="absolute -left-6 top-1/2 -translate-y-1/2">
                  <svg class="animate-spin h-4 w-4 text-slate-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                  </svg>
                </div>
              </div>
            </div>
          </div>
        </div>
      </template>

      <div x-show="messages.length === 0" class="min-h-full flex flex-col items-center justify-center text-slate-300 text-sm py-10" style="display: none;">
        <svg class="w-10 h-10 mb-2 opacity-60" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 10h8M8 14h5m-7 7l2.4-3.2A9 9 0 1 1 21 12a9 9 0 0 1-12.6 8.8L6 21z"></path>
        </svg>
        <div>暂无聊天记录</div>
      </div>
    </div>

    {% if can_chat %}
    <div class="absolute left-0 right-0 bottom-0 bg-white border-t border-slate-100 p-3 z-10">
      <div class="flex items-end gap-2 bg-slate-50 p-1 rounded-xl border border-slate-200 transition-all">
        <textarea
          x-model="inputText"
          @keydown.enter.prevent="if(!$event.shiftKey) sendMessage()"
          class="flex-1 bg-transparent border-none outline-none p-1 text-sm focus:ring-0 resize-none max-h-24 min-h-[24px]"
          rows="1"
          placeholder="输入消息..."
          data-test="mobile-chat-input"></textarea>

        <div class="flex items-center gap-1 pb-0.5 shrink-0">
          <button @click="$refs.fileInput.click()" class="p-1.5 text-slate-400 hover:text-emerald-500 rounded-full hover:bg-slate-200 transition-colors" title="发送图片">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
            </svg>
            <input type="file" x-ref="fileInput" class="hidden" accept="image/*" @change="uploadImage($event)">
          </button>

          <button
            @click="sendMessage()"
            :disabled="!inputText.trim()"
            class="p-1.5 bg-emerald-500 text-white rounded-lg hover:bg-emerald-600 disabled:opacity-50 disabled:cursor-not-allowed transition-colors shadow-sm"
            data-test="mobile-send-btn">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
            </svg>
          </button>
        </div>
      </div>
    </div>
    {% endif %}
  </div>
</div>
{% endblock %}

{% block extra_head %}
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<script>
  function mobilePatientChatList() {
    return {
      apiUrl: "{% url 'web_doctor:mobile_patient_chat_list' patient_id=patient.id %}",
      listApiUrl: "{{ chat_api_urls.list }}",
      sendApiUrl: "{{ chat_api_urls.send }}",
      uploadApiUrl: "{{ chat_api_urls.upload }}",
      readApiUrl: "{{ chat_api_urls.read }}",
      conversationId: {{ conversation_id|default:"null" }},
      canChat: {{ can_chat|yesno:"true,false" }},
      messages: {{ messages|safe }},
      hasNext: {{ has_next|yesno:"true,false" }},
      nextCursor: "{{ next_cursor }}",
      loadingOlder: false,
      inputText: "",
      currentUserId: {{ request.user.id|default:0 }},
      pullStartY: null,
      pullDistance: 0,
      pullTriggered: false,
      pollInterval: null,
      csrfToken: "",

      init() {
        this.csrfToken = this.getCsrfToken();
        this.$nextTick(() => {
          this.scrollToBottom();
          this.markLatestRead();
        });
        this.startPolling();
      },

      goBack() {
        if (window.history.length > 1) {
          window.history.back();
          return;
        }
        window.location.href = "{% url 'web_doctor:mobile_patient_home' patient.id %}";
      },

      getCsrfToken() {
        const el = document.querySelector("[name=csrfmiddlewaretoken]");
        return el ? el.value : "";
      },

      isMyMessage(msg) {
        return msg.sender_id === this.currentUserId;
      },

      formatTime(isoString) {
        if (!isoString) return "";
        const date = new Date(isoString);
        const pad = (n) => String(n).padStart(2, "0");
        const yyyy = date.getFullYear();
        const mm = pad(date.getMonth() + 1);
        const dd = pad(date.getDate());
        const hh = pad(date.getHours());
        const min = pad(date.getMinutes());
        return `${yyyy}-${mm}-${dd} ${hh}:${min}`;
      },

      getAvatarColor(role) {
        if (role === 1) return "bg-blue-400";
        if (role === 2) return "bg-indigo-400";
        if (role === 3) return "bg-rose-500";
        return "bg-emerald-500";
      },

      scrollToBottom() {
        const el = this.$refs.messagesContainer;
        if (!el) return;
        el.scrollTop = el.scrollHeight;
      },

      getLatestStableMessageId() {
        for (let i = this.messages.length - 1; i >= 0; i -= 1) {
          const id = this.messages[i].id;
          if (typeof id === "number") return id;
          if (typeof id === "string" && /^\d+$/.test(id)) return parseInt(id, 10);
        }
        return null;
      },

      async loadOlder() {
        if (this.loadingOlder || !this.hasNext || !this.nextCursor) return;
        this.loadingOlder = true;
        const container = this.$refs.messagesContainer;
        const prevScrollHeight = container ? container.scrollHeight : 0;
        const prevScrollTop = container ? container.scrollTop : 0;

        try {
          const url = `${this.apiUrl}?format=json&cursor=${encodeURIComponent(this.nextCursor)}`;
          const res = await fetch(url);
          if (!res.ok) return;
          const data = await res.json();
          const incoming = Array.isArray(data.messages) ? data.messages : [];
          const existingIds = new Set(this.messages.map((m) => m.id));
          const newMsgs = incoming.filter((m) => !existingIds.has(m.id));
          if (newMsgs.length > 0) {
            this.messages = [...newMsgs, ...this.messages];
          }
          this.hasNext = !!data.has_next;
          this.nextCursor = data.next_cursor || "";
          this.$nextTick(() => {
            if (!container) return;
            const nextScrollHeight = container.scrollHeight;
            container.scrollTop = prevScrollTop + (nextScrollHeight - prevScrollHeight);
          });
        } finally {
          this.loadingOlder = false;
        }
      },

      async sendMessage() {
        const content = this.inputText.trim();
        if (!this.canChat || !content || !this.conversationId) return;

        const tempMsg = {
          id: `temp-${Date.now()}`,
          sender_id: this.currentUserId,
          sender_name: "我",
          sender_role: 5,
          content_type: 1,
          text_content: content,
          created_at: new Date().toISOString(),
          created_at_display: this.formatTime(new Date().toISOString()),
          sending: true,
        };
        this.messages.push(tempMsg);
        this.inputText = "";
        this.$nextTick(() => this.scrollToBottom());

        try {
          const res = await fetch(this.sendApiUrl, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "X-CSRFToken": this.csrfToken,
            },
            body: JSON.stringify({
              conversation_id: this.conversationId,
              content: content,
            }),
          });
          const data = await res.json();
          if (!res.ok || data.status !== "success") {
            throw new Error((data && data.message) || "发送失败");
          }

          const idx = this.messages.findIndex((m) => m.id === tempMsg.id);
          if (idx !== -1) {
            this.messages[idx] = {
              ...tempMsg,
              ...data.message,
              sender_id: this.currentUserId,
              sender_name: "我",
              sender_role: 5,
              content_type: 1,
              text_content: content,
              sending: false,
            };
          }
        } catch (err) {
          this.messages = this.messages.filter((m) => m.id !== tempMsg.id);
          alert(`发送失败: ${err.message}`);
        }
      },

      async uploadImage(event) {
        const file = event.target.files[0];
        if (!this.canChat || !file || !this.conversationId) {
          event.target.value = "";
          return;
        }

        const formData = new FormData();
        formData.append("conversation_id", this.conversationId);
        formData.append("image", file);
        formData.append("csrfmiddlewaretoken", this.csrfToken);

        try {
          const res = await fetch(this.uploadApiUrl, {
            method: "POST",
            body: formData,
          });
          const data = await res.json();
          if (!res.ok || data.status !== "success") {
            throw new Error((data && data.message) || "上传失败");
          }

          this.messages.push({
            ...data.message,
            sender_id: this.currentUserId,
            sender_name: "我",
            sender_role: 5,
            content_type: 2,
          });
          this.$nextTick(() => this.scrollToBottom());
        } catch (err) {
          alert(`上传失败: ${err.message}`);
        } finally {
          event.target.value = "";
        }
      },

      startPolling() {
        this.stopPolling();
        this.pollInterval = setInterval(() => {
          this.pollMessages();
        }, 5000);
      },

      stopPolling() {
        if (!this.pollInterval) return;
        clearInterval(this.pollInterval);
        this.pollInterval = null;
      },

      async pollMessages() {
        if (!this.conversationId) return;
        const lastId = this.getLatestStableMessageId();

        try {
          let url = `${this.listApiUrl}?conversation_id=${this.conversationId}`;
          if (lastId) {
            url += `&after_id=${lastId}`;
          }
          const res = await fetch(url);
          if (!res.ok) return;
          const data = await res.json();
          if (data.status !== "success") return;

          const incoming = Array.isArray(data.messages) ? data.messages : [];
          if (incoming.length === 0) return;

          const existingIds = new Set(this.messages.map((m) => m.id));
          const newMsgs = incoming.filter((m) => !existingIds.has(m.id));
          if (newMsgs.length === 0) return;

          this.messages = [...this.messages, ...newMsgs];
          this.$nextTick(() => this.scrollToBottom());

          const latestId = this.getLatestStableMessageId();
          if (latestId) {
            this.markRead(this.conversationId, latestId);
          }
        } catch (e) {
        }
      },

      markLatestRead() {
        if (!this.conversationId) return;
        const latestId = this.getLatestStableMessageId();
        if (!latestId) return;
        this.markRead(this.conversationId, latestId);
      },

      async markRead(conversationId, lastMessageId) {
        if (!conversationId || !lastMessageId) return;
        try {
          await fetch(this.readApiUrl, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "X-CSRFToken": this.csrfToken,
            },
            body: JSON.stringify({
              conversation_id: conversationId,
              last_message_id: lastMessageId,
            }),
          });
        } catch (e) {
        }
      },

      onTouchStart(e) {
        const container = this.$refs.messagesContainer;
        if (!container) return;
        if (container.scrollTop > 0) return;
        const touch = e.touches && e.touches[0];
        if (!touch) return;
        this.pullStartY = touch.clientY;
        this.pullDistance = 0;
        this.pullTriggered = false;
      },

      onTouchMove(e) {
        if (this.pullStartY === null) return;
        const container = this.$refs.messagesContainer;
        if (!container || container.scrollTop > 0) return;
        const touch = e.touches && e.touches[0];
        if (!touch) return;
        const dy = touch.clientY - this.pullStartY;
        if (dy <= 0) return;
        this.pullDistance = dy;
        if (dy > 60 && !this.pullTriggered) {
          this.pullTriggered = true;
        }
      },

      onTouchEnd() {
        if (this.pullStartY === null) return;
        const shouldLoad = this.pullTriggered;
        this.pullStartY = null;
        this.pullDistance = 0;
        this.pullTriggered = false;
        if (shouldLoad) {
          this.loadOlder();
        }
      }
    };
  }
</script>
{% endblock %}
